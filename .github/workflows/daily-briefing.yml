name: 🦎 Daily Gecko Briefing

on:
  schedule:
    # 매일 오전 7시 (KST) = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  
  # 수동 실행도 가능하게
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # index.html 푸시 권한

    steps:
      - name: 📥 레포 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          pip install \
            anthropic \
            google-api-python-client \
            PyGithub \
            requests

      - name: 🦎 브리핑 생성 및 푸시
        env:
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: python generate_briefing.py

      - name: ✅ 완료 알림
        run: |
          echo "브리핑 생성 완료!"
          echo "URL: https://크레노트.com"
