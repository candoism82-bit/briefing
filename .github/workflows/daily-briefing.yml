name: Daily Gecko Briefing
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      force_yt_refresh:
        description: 'YouTube 영상 목록 강제 갱신 (true 입력)'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests google-api-python-client

      - name: 브리핑 생성 및 푸시
        env:
          OPENWEATHER_API_KEY:  ${{ secrets.OPENWEATHER_API_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
          FORCE_YT_REFRESH:     ${{ github.event.inputs.force_yt_refresh || 'false' }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: python generate_briefing.py

      - name: 완료 알림
        run: echo "브리핑 생성 완료!"
