<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🥚 인큐베이터 트레이 관리 · 크레오늘</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf8f4;--white:#fff;--ink:#1a1a1a;--ink-soft:#5a5a5a;--ink-light:#9a9a9a;
  --accent:#4a7c59;--accent-light:#e8f2ec;--accent-soft:#c8dfd0;--border:#e8e4de;
  --warn:#d97706;--warn-light:#fff7ed;--danger:#dc2626;--danger-light:#fff1f1;
  --ok:#16a34a;--ok-light:#f0fdf4;
  --tray-bg:#2a2a2a;--tray-border:#1a1a1a;--tray-cell:#1e1e1e;--tray-wall:#3a3a3a;
  --egg-base:#f5f0e8;--egg-shadow:rgba(0,0,0,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;color:var(--ink);font-family:'Gowun Dodum',serif;min-height:100vh;padding:0 0 80px}

/* 상단 헤더 */
.top-bar{background:linear-gradient(135deg,#1a2e20,#2d5a3d);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:2px solid #4a7c59}
.top-bar-title{font-family:'Playfair Display',serif;font-size:17px;color:#fff}
.top-bar-sub{font-size:9px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace;letter-spacing:.12em;margin-top:2px}
.btn-new-tray{background:rgba(74,124,89,.4);border:1px solid rgba(74,124,89,.7);border-radius:8px;color:#a8d5b5;font-size:11px;padding:7px 12px;cursor:pointer;font-family:'Gowun Dodum',serif;transition:.2s;white-space:nowrap}
.btn-new-tray:hover{background:rgba(74,124,89,.6)}

/* 트레이 탭 */
.tray-tabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;background:#111;border-bottom:1px solid #333}
.tray-tabs::-webkit-scrollbar{display:none}
.tray-tab{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:11px;background:#222;color:#666;cursor:pointer;border:1px solid #333;transition:.2s;font-family:'DM Mono',monospace}
.tray-tab.active{background:#4a7c59;color:#fff;border-color:#4a7c59}

/* 데이터 바 */
.data-bar{display:flex;gap:6px;padding:10px 12px;background:#111;border-bottom:1px solid #222}
.btn-io{flex:1;padding:8px;border-radius:8px;font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;background:#1a1a1a;border:1px solid #333;color:#666;transition:.2s;letter-spacing:.05em}
.btn-io:hover{border-color:#4a7c59;color:#a8d5b5}

/* 트레이 뷰 */
.tray-view{display:none}
.tray-view.active{display:block}

/* 트레이 설정 패널 */
.tray-config{background:#111;padding:12px;border-bottom:1px solid #222}
.config-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.config-name{background:transparent;border:none;border-bottom:1px solid #333;color:#ccc;font-family:'Playfair Display',serif;font-size:16px;outline:none;flex:1;min-width:100px;padding:2px 4px}
.config-name::placeholder{color:#444}
.config-group{display:flex;align-items:center;gap:4px}
.config-label{font-size:9px;color:#555;font-family:'DM Mono',monospace;letter-spacing:.08em}
.config-select,.config-num{background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#aaa;font-size:12px;padding:5px 8px;font-family:'DM Mono',monospace;outline:none}
.config-num{width:52px;text-align:center}
.btn-apply{background:#4a7c59;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:.2s;white-space:nowrap}
.btn-apply:hover{background:#3d6b4a}
.btn-del-tray{background:none;border:1px solid #333;border-radius:6px;color:#555;font-size:10px;padding:5px 8px;cursor:pointer;transition:.2s}
.btn-del-tray:hover{border-color:#dc2626;color:#dc2626}
.summary-line{font-size:9px;color:#555;font-family:'DM Mono',monospace;padding:6px 4px 0;letter-spacing:.06em}

/* ═══════════════════════════════════════
   실물 트레이 스타일
═══════════════════════════════════════ */
.tray-box{
  background:var(--tray-bg);
  border:3px solid var(--tray-border);
  box-shadow:inset 0 0 20px rgba(0,0,0,.5), 0 4px 20px rgba(0,0,0,.5);
  overflow:hidden;
}
.tray-grid{
  display:grid;
  gap:0;
}
/* 각 칸 (하나의 칸 = 알 2개 공간) */
.cell{
  border-right:2px solid var(--tray-border);
  border-bottom:2px solid var(--tray-border);
  padding:6px 4px 4px;
  background:var(--tray-cell);
  position:relative;
  min-height:110px;
  transition:background .3s;
}
.cell:last-child{border-right:none}
.cell.last-row{border-bottom:none}
/* D-Day 0~7 — 주황 배경 + 테두리 점멸 */
.cell.cell-soon{
  background:rgba(217,119,6,.18);
  animation:cell-warn 1.8s ease-in-out infinite;
}
/* D-Day 초과 — 빨간 배경 + 테두리 강한 점멸 */
.cell.cell-overdue{
  background:rgba(220,38,38,.22);
  animation:cell-alert 1s ease-in-out infinite;
}
@keyframes cell-warn{
  0%,100%{background:rgba(217,119,6,.13);box-shadow:inset 0 0 0 1.5px rgba(217,119,6,.3)}
  50%{background:rgba(217,119,6,.28);box-shadow:inset 0 0 0 1.5px rgba(217,119,6,.8)}
}
@keyframes cell-alert{
  0%,100%{background:rgba(220,38,38,.15);box-shadow:inset 0 0 0 2px rgba(220,38,38,.3)}
  50%{background:rgba(220,38,38,.35);box-shadow:inset 0 0 0 2px rgba(220,38,38,.9)}
}

/* D-Day 레이블 */
.cell-dday{
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  margin-bottom:4px;
  height:16px;
  line-height:16px;
}
.dd-empty{color:#333}
.dd-normal{color:#4a7c59}
.dd-soon{color:#fbbf24;animation:pulse 1.5s ease-in-out infinite;text-shadow:0 0 6px rgba(251,191,36,.6)}
.dd-overdue{color:#f87171;animation:pulse 1s ease-in-out infinite;text-shadow:0 0 8px rgba(248,113,113,.8)}
.dd-hatched{color:#16a34a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 알 2개 나란히 */
.eggs-row{
  display:flex;
  gap:3px;
  justify-content:center;
  align-items:center;
}

/* 알 하나 */
.egg-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position:relative;
}
.egg-svg{
  width:100%;
  max-width:68px;
  display:block;
  filter:drop-shadow(0 2px 4px var(--egg-shadow));
  transition:.15s;
}
.egg-wrap:hover .egg-svg{filter:drop-shadow(0 3px 8px rgba(0,0,0,.4)) brightness(1.05)}
.egg-wrap.empty .egg-svg{opacity:.15}
.egg-wrap.empty:hover .egg-svg{opacity:.35}
.egg-wrap.dragging{opacity:.35;transform:scale(.95)}
.egg-wrap.drop-target .egg-svg{filter:drop-shadow(0 0 8px rgba(255,220,100,.9)) brightness(1.15);transform:scale(1.08)}

/* 알 위 텍스트 */
.egg-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-56%);
  text-align:center;
  pointer-events:none;
  width:90%;
}
.egg-text .parents{font-size:7.5px;color:#4a3520;font-weight:700;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.egg-text .hdate{font-size:6.5px;color:#6b4e2a;font-family:'DM Mono',monospace;margin-top:1px}
.egg-text .plus{font-size:14px;color:#555;line-height:1}

/* 알 색상 상태 */
.egg-normal{fill:#f5f0e8}
.egg-soon{fill:#ffe0a0}
.egg-overdue{fill:#ffc0c0}
.egg-hatched{fill:#c8e6c9;opacity:.7}
.egg-empty-fill{fill:#2a2a2a}

/* 빈 상태 */
.empty-state{text-align:center;padding:60px 20px;color:#444}
.empty-state .emoji{font-size:48px;display:block;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.8;color:#555}
.btn-start{background:#4a7c59;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-family:'Gowun Dodum',serif;cursor:pointer;margin-top:16px}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1a1a1a;border:1px solid #333;border-radius:20px 20px 0 0;padding:22px 20px 40px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;color:#ccc;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;color:#555;cursor:pointer}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:#666;display:block;margin-bottom:5px;font-family:'DM Mono',monospace;letter-spacing:.06em}
.form-input{width:100%;padding:11px 14px;border:1.5px solid #333;border-radius:10px;font-size:15px;font-family:'Gowun Dodum',serif;color:#ccc;background:#111;outline:none}
.form-input:focus{border-color:#4a7c59}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.eggs-radio{display:flex;gap:8px;margin-top:4px}
.eggs-radio label{flex:1;border:1.5px solid #333;border-radius:10px;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:#666;transition:.15s}
.eggs-radio input{display:none}
.eggs-radio input:checked + label{border-color:#4a7c59;color:#a8d5b5;background:rgba(74,124,89,.15)}
.btn-save{width:100%;padding:13px;background:#4a7c59;color:#fff;border:none;border-radius:12px;font-size:14px;font-family:'Gowun Dodum',serif;cursor:pointer;margin-top:4px;transition:.2s}
.btn-save:hover{background:#3d6b4a}
.btn-hatched{width:100%;padding:11px;background:rgba(22,163,74,.1);color:#16a34a;border:1px solid #16a34a;border-radius:12px;font-size:12px;font-family:'Gowun Dodum',serif;cursor:pointer;margin-top:8px}
.btn-clear{width:100%;padding:11px;background:none;color:#dc2626;border:1px solid #dc2626;border-radius:12px;font-size:12px;font-family:'Gowun Dodum',serif;cursor:pointer;margin-top:8px}
.modal-divider{height:1px;background:#222;margin:12px 0}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-bar-title">🥚 인큐베이터 관리</div>
    <div class="top-bar-sub">CREONEL · TRAY MANAGER</div>
  </div>
  <button class="btn-new-tray" onclick="createTray()">+ 트레이 추가</button>
</div>

<div id="tray-tabs" class="tray-tabs"></div>

<div class="data-bar">
  <button class="btn-io" onclick="exportData()">📥 백업 저장</button>
  <button class="btn-io" onclick="document.getElementById('file-input').click()">📤 백업 불러오기</button>
  <input type="file" id="file-input" accept=".json" onchange="importData(event)" style="display:none">
</div>

<div id="tray-views"></div>
<div id="empty-state">
  <div class="empty-state">
    <span class="emoji">🥚</span>
    <p>아직 트레이가 없어요.<br>트레이를 추가하세요.</p>
    <button class="btn-start" onclick="createTray()">+ 첫 트레이 만들기</button>
  </div>
</div>

<!-- 모달 -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">🥚 알 정보</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <!-- 알 수 선택 (새 입력 시만 표시) -->
    <div class="form-group" id="egg-count-group">
      <div class="form-label">산란 알 수</div>
      <div class="eggs-radio">
        <input type="radio" name="egg-count" id="ec1" value="1">
        <label for="ec1">🥚 1개</label>
        <input type="radio" name="egg-count" id="ec2" value="2" checked>
        <label for="ec2">🥚🥚 2개</label>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="form-group">
      <div class="form-label">산란일</div>
      <input type="date" class="form-input" id="f-laydate">
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">♀ 어미 (모)</div>
        <input type="text" class="form-input" id="f-mom" placeholder="이름 또는 모프">
      </div>
      <div class="form-group">
        <div class="form-label">♂ 아비 (부)</div>
        <input type="text" class="form-input" id="f-dad" placeholder="이름 또는 모프">
      </div>
    </div>
    <button class="btn-save" onclick="saveEgg()">저장</button>
    <button class="btn-hatched" id="btn-hatched" onclick="markHatched()" style="display:none">🐣 해칭 완료로 표시</button>
    <button class="btn-clear" id="btn-clear" onclick="clearEgg()">🗑 삭제</button>
  </div>
</div>

<script>
// ══════════════════════════════════
// 해칭 기간 테이블
// ══════════════════════════════════
const HATCH_DAYS={'22':91,'22.5':87,'23':80,'23.5':76,'24':73,'24.5':69,'25':65,'25.5':61,'26':58};

// ══════════════════════════════════
// 데이터
// eggs: { 'r-c-slot': {mom,dad,laydate,hatched} }
// slot 0 = 왼쪽, slot 1 = 오른쪽
// ══════════════════════════════════
let trays=[], currentTrayId=null;
let mTrayId=null, mRow=null, mCol=null, mSlot=null;

function save(){localStorage.setItem('creotoday_trays_v2',JSON.stringify(trays));}
function load(){const r=localStorage.getItem('creotoday_trays_v2');if(r)trays=JSON.parse(r);}
function today(){return new Date().toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function calcDDay(laydate,temp){
  if(!laydate||!temp)return null;
  const days=HATCH_DAYS[String(temp)];if(!days)return null;
  const hd=new Date(laydate);hd.setDate(hd.getDate()+days);
  const now=new Date();now.setHours(0,0,0,0);
  return{diff:Math.round((hd-now)/86400000),hd,days};
}
function fmtMD(iso){if(!iso)return'';const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()}`;}

// ══════════════════════════════════
// 알 SVG 생성
// ══════════════════════════════════
function eggSVG(fillClass){
  return `<svg class="egg-svg" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="30" cy="44" rx="26" ry="34" class="${fillClass}"/>
    <ellipse cx="30" cy="44" rx="26" ry="34" fill="none" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
    <ellipse cx="22" cy="30" rx="5" ry="7" fill="rgba(255,255,255,.18)" transform="rotate(-20 22 30)"/>
  </svg>`;
}

// ══════════════════════════════════
// 트레이 관리
// ══════════════════════════════════
function createTray(){
  const t={id:uid(),name:`트레이 ${trays.length+1}`,temp:'24',rows:4,cols:2,eggs:{}};
  trays.push(t);save();render();switchTray(t.id);
}
function deleteTray(id){
  trays=trays.filter(t=>t.id!==id);save();
  currentTrayId=trays.length>0?trays[0].id:null;render();
}
function applyConfig(id){
  const t=trays.find(t=>t.id===id);if(!t)return;
  t.name=document.getElementById(`cn-${id}`).value||t.name;
  t.temp=document.getElementById(`ct-${id}`).value;
  t.rows=parseInt(document.getElementById(`cr-${id}`).value)||4;
  t.cols=parseInt(document.getElementById(`cc-${id}`).value)||2;
  save();renderTrayInto(t,document.querySelector(`.tray-view[data-id="${id}"]`));
  const tab=document.querySelector(`.tray-tab[data-id="${id}"]`);if(tab)tab.textContent=t.name;
}
function switchTray(id){
  currentTrayId=id;
  document.querySelectorAll('.tray-tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  document.querySelectorAll('.tray-view').forEach(v=>v.classList.toggle('active',v.dataset.id===id));
  document.getElementById('empty-state').style.display='none';
}
function render(){
  const tabsEl=document.getElementById('tray-tabs');
  const viewsEl=document.getElementById('tray-views');
  const emptyEl=document.getElementById('empty-state');
  tabsEl.innerHTML='';viewsEl.innerHTML='';
  if(trays.length===0){emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  trays.forEach(tray=>{
    const tab=document.createElement('div');
    tab.className='tray-tab'+(tray.id===currentTrayId?' active':'');
    tab.dataset.id=tray.id;tab.textContent=tray.name;
    tab.onclick=()=>switchTray(tray.id);tabsEl.appendChild(tab);
    const view=document.createElement('div');
    view.className='tray-view'+(tray.id===currentTrayId?' active':'');
    view.dataset.id=tray.id;viewsEl.appendChild(view);
    renderTrayInto(tray,view);
  });
  if(!currentTrayId&&trays.length>0)switchTray(trays[0].id);
}

function renderTrayInto(tray,container){
  if(!container)return;
  const temps=Object.keys(HATCH_DAYS).map(t=>`<option value="${t}"${tray.temp==t?' selected':''}>${t}°C</option>`).join('');

  // 요약
  let total=0,soon=0,overdue=0,hatched=0;
  Object.values(tray.eggs).forEach(e=>{
    total++;
    if(e.hatched){hatched++;return;}
    const dd=calcDDay(e.laydate,tray.temp);if(!dd)return;
    if(dd.diff<0)overdue++;else if(dd.diff<=7)soon++;
  });
  const sumParts=[`${tray.rows}×${tray.cols} · ${total}개`];
  if(soon)sumParts.push(`⚡D-7이내 ${soon}`);
  if(overdue)sumParts.push(`⚠️초과 ${overdue}`);
  if(hatched)sumParts.push(`🐣${hatched}`);

  container.innerHTML=`
    <div class="tray-config">
      <div class="config-row">
        <input class="config-name" id="cn-${tray.id}" value="${tray.name}" placeholder="트레이 이름">
        <div class="config-group"><span class="config-label">온도</span><select class="config-select" id="ct-${tray.id}">${temps}</select></div>
        <div class="config-group"><span class="config-label">행</span><input type="number" class="config-num" id="cr-${tray.id}" value="${tray.rows}" min="1" max="20"></div>
        <div class="config-group"><span class="config-label">열</span><input type="number" class="config-num" id="cc-${tray.id}" value="${tray.cols}" min="1" max="6"></div>
        <button class="btn-apply" onclick="applyConfig('${tray.id}')">적용</button>
        <button class="btn-del-tray" onclick="deleteTray('${tray.id}')">삭제</button>
      </div>
      <div class="summary-line">${sumParts.join(' · ')}</div>
    </div>
    <div class="tray-box">
      <div class="tray-grid" id="grid-${tray.id}" style="grid-template-columns:repeat(${tray.cols},1fr)"></div>
    </div>`;

  renderGrid(tray);
  attachDragEvents(tray);
}

function renderGrid(tray){
  const grid=document.getElementById(`grid-${tray.id}`);if(!grid)return;
  grid.style.gridTemplateColumns=`repeat(${tray.cols},1fr)`;
  grid.innerHTML='';
  const totalRows=tray.rows;
  for(let r=0;r<tray.rows;r++){
    for(let c=0;c<tray.cols;c++){
      const cell=document.createElement('div');
      cell.className='cell'+(r===totalRows-1?' last-row':'');
      cell.dataset.r=r;cell.dataset.c=c;
      // 이 칸의 두 슬롯 D-Day 계산 (더 급한 것 기준)
      const e0=tray.eggs[`${r}-${c}-0`];
      const e1=tray.eggs[`${r}-${c}-1`];
      let ddayLabel='', ddayClass='dd-empty';
      const eggs=[e0,e1].filter(Boolean).filter(e=>!e.hatched);
      if(e0?.hatched&&e1?.hatched){ddayLabel='🐣';ddayClass='dd-hatched';}
      else if(eggs.length>0){
        const dds=eggs.map(e=>calcDDay(e.laydate,tray.temp)).filter(Boolean);
        if(dds.length>0){
          const minDiff=Math.min(...dds.map(d=>d.diff));
          if(minDiff<0){ddayLabel=`D+${Math.abs(minDiff)}`;ddayClass='dd-overdue';cell.classList.add('cell-overdue');}
          else if(minDiff<=7){ddayLabel=`D-${minDiff}`;ddayClass='dd-soon';cell.classList.add('cell-soon');}
          else{ddayLabel=`D-${minDiff}`;ddayClass='dd-normal';}
        }
      } else if(e0?.hatched||e1?.hatched){ddayLabel='🐣';ddayClass='dd-hatched';}

      cell.innerHTML=`
        <div class="cell-dday ${ddayClass}">${ddayLabel}</div>
        <div class="eggs-row">
          ${renderEgg(tray,r,c,0,e0)}
          ${renderEgg(tray,r,c,1,e1)}
        </div>`;

      cell.querySelectorAll('.egg-wrap').forEach(ew=>{
        const slot=parseInt(ew.dataset.slot);
        ew.onclick=(ev)=>{
          ev.stopPropagation();
          if(drag.active)return; // 드래그 중 모달 방지
          openModal(tray.id,r,c,slot);
        };
      });
      grid.appendChild(cell);
    }
  }
}

function renderEgg(tray,r,c,slot,egg){
  if(!egg){
    return `<div class="egg-wrap empty" data-slot="${slot}">
      ${eggSVG('egg-empty-fill')}
      <div class="egg-text"><span class="plus">+</span></div>
    </div>`;
  }
  const dd=calcDDay(egg.laydate,tray.temp);
  let fillClass='egg-normal';
  if(egg.hatched) fillClass='egg-hatched';
  else if(dd){
    if(dd.diff<0)fillClass='egg-overdue';
    else if(dd.diff<=7)fillClass='egg-soon';
  }
  const parentLine=`${egg.dad||'?'}|${egg.mom||'?'}`;
  const dateLine=egg.laydate?fmtMD(egg.laydate)+(dd?`→${fmtMD(dd.hd.toISOString())}`:''):'';
  return `<div class="egg-wrap" data-slot="${slot}">
    ${eggSVG(fillClass)}
    <div class="egg-text">
      <div class="parents">${parentLine}</div>
      <div class="hdate">${dateLine}</div>
    </div>
  </div>`;
}

// ══════════════════════════════════
// 모달
// ══════════════════════════════════
function openModal(trayId,r,c,slot){
  mTrayId=trayId;mRow=r;mCol=c;mSlot=slot;
  const tray=trays.find(t=>t.id===trayId);
  const key=`${r}-${c}-${slot}`;
  const egg=tray?.eggs[key];
  const isNew=!egg;

  document.getElementById('modal-title-text').textContent=`🥚 ${r+1}행 ${c+1}열 (${slot===0?'왼':'오'}쪽)`;
  document.getElementById('egg-count-group').style.display=isNew?'block':'none';
  document.getElementById('f-laydate').value=egg?.laydate||today();
  document.getElementById('f-mom').value=egg?.mom||'';
  document.getElementById('f-dad').value=egg?.dad||'';
  document.getElementById('btn-hatched').style.display=(egg&&!egg.hatched)?'block':'none';
  document.getElementById('btn-clear').style.display=egg?'block':'none';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function closeModalBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}

function saveEgg(){
  const tray=trays.find(t=>t.id===mTrayId);if(!tray)return;
  const eggData={
    mom:document.getElementById('f-mom').value.trim(),
    dad:document.getElementById('f-dad').value.trim(),
    laydate:document.getElementById('f-laydate').value,
    hatched:false
  };
  // 알 수 선택 처리 (신규 입력 시)
  const ecGroup=document.getElementById('egg-count-group');
  if(ecGroup.style.display!=='none'){
    const cnt=document.querySelector('input[name="egg-count"]:checked')?.value||'2';
    if(cnt==='2'){
      // 두 슬롯 모두 저장
      tray.eggs[`${mRow}-${mCol}-0`]={...eggData};
      tray.eggs[`${mRow}-${mCol}-1`]={...eggData};
    } else {
      // 선택한 슬롯만
      tray.eggs[`${mRow}-${mCol}-${mSlot}`]={...eggData};
    }
  } else {
    tray.eggs[`${mRow}-${mCol}-${mSlot}`]={...eggData,hatched:tray.eggs[`${mRow}-${mCol}-${mSlot}`]?.hatched||false};
  }
  save();renderTrayInto(tray,document.querySelector(`.tray-view[data-id="${mTrayId}"]`));closeModal();
}
function clearEgg(){
  const tray=trays.find(t=>t.id===mTrayId);if(!tray)return;
  delete tray.eggs[`${mRow}-${mCol}-${mSlot}`];
  save();renderTrayInto(tray,document.querySelector(`.tray-view[data-id="${mTrayId}"]`));closeModal();
}
function markHatched(){
  const tray=trays.find(t=>t.id===mTrayId);if(!tray)return;
  const key=`${mRow}-${mCol}-${mSlot}`;
  if(tray.eggs[key])tray.eggs[key].hatched=true;
  save();renderTrayInto(tray,document.querySelector(`.tray-view[data-id="${mTrayId}"]`));closeModal();
}

// ══════════════════════════════════
// 백업
// ══════════════════════════════════
function exportData(){
  const blob=new Blob([JSON.stringify(trays,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`creotoday_trays_${today()}.json`;a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        trays=data;currentTrayId=trays.length>0?trays[0].id:null;save();render();
        if(currentTrayId)switchTray(currentTrayId);
      }
    }catch{alert('파일을 읽을 수 없어요.');}
  };
  reader.readAsText(file);e.target.value='';
}

// ══════════════════════════════════
// 초기화
// ══════════════════════════════════
load();
if(trays.length>0){currentTrayId=trays[0].id;render();switchTray(currentTrayId);}
else render();
setInterval(()=>trays.forEach(t=>renderGrid(t)),60000);

// ══════════════════════════════════
// 드래그 & 드랍 — document 레벨 방식 (모바일/PC 공통)
// ══════════════════════════════════
const DRAG_THRESHOLD = 8;   // 이 픽셀 이상 움직여야 드래그 취소 안됨
const LONG_PRESS_MS  = 400; // 롱프레스 인식 시간

let drag = {
  active: false, trayId: null, r: null, c: null, slot: null,
  startX: 0, startY: 0, moved: false, timer: null
};

// ── 고스트 엘리먼트 ──
const ghost = document.createElement('div');
ghost.style.cssText = [
  'position:fixed','pointer-events:none','z-index:9999','opacity:0',
  'transform:translate(-50%,-60%) scale(1.15)',
  'filter:drop-shadow(0 6px 16px rgba(0,0,0,.5))',
  'transition:opacity .12s'
].join(';');
document.body.appendChild(ghost);

function showGhost(egg, x, y) {
  ghost.innerHTML = `<div style="
    background:linear-gradient(160deg,#fffdf5,#f5ead8);
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    width:58px;height:74px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:5px 4px;
  ">
    <div style="font-size:9px;font-weight:700;color:#5a3e1e;line-height:1.4;text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(egg.dad||'?')}</div>
    <div style="font-size:7px;color:rgba(90,62,30,.4);margin:1px 0">—</div>
    <div style="font-size:9px;font-weight:700;color:#5a3e1e;line-height:1.4;text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(egg.mom||'?')}</div>
  </div>`;
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
  ghost.style.opacity = '1';
}
function hideGhost() { ghost.style.opacity = '0'; }
function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

// ── 좌표로 egg-wrap 찾기 ──
function getEggWrapAt(x, y) {
  const els = document.elementsFromPoint(x, y);
  for (const el of els) {
    const ew = el.closest?.('.egg-wrap');
    if (ew) {
      const cell = ew.closest('.cell');
      if (!cell) continue;
      return {
        ew,
        slot: parseInt(ew.dataset.slot),
        r:    parseInt(cell.dataset.r),
        c:    parseInt(cell.dataset.c),
        trayId: cell.closest('.tray-grid')?.dataset.trayId
      };
    }
  }
  return null;
}

// ── 드래그 시작 ──
function startDrag(trayId, r, c, slot, x, y) {
  const tray = trays.find(t => t.id === trayId);
  const egg  = tray?.eggs[`${r}-${c}-${slot}`];
  if (!egg) return;

  drag.active = true; drag.trayId = trayId;
  drag.r = r; drag.c = c; drag.slot = slot;
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';

  // 소스 알 반투명
  const srcEw = document.querySelector(
    `[data-tray-id="${trayId}"] .cell[data-r="${r}"][data-c="${c}"] .egg-wrap[data-slot="${slot}"]`
  );
  if (srcEw) srcEw.classList.add('dragging');

  showGhost(egg, x, y);
  navigator.vibrate?.(30); // 진동 피드백 (지원 시)
}

// ── 드래그 이동 ──
function onDragMove(x, y) {
  if (!drag.active) return;
  moveGhost(x, y);
  document.querySelectorAll('.egg-wrap.drop-target').forEach(e => e.classList.remove('drop-target'));
  const target = getEggWrapAt(x, y);
  if (target && !(target.r === drag.r && target.c === drag.c && target.slot === drag.slot)) {
    target.ew.classList.add('drop-target');
  }
}

// ── 드래그 종료 ──
function onDragEnd(x, y) {
  if (!drag.active) return;

  const target = getEggWrapAt(x, y);
  cleanup();

  if (target && !(target.r === drag.r && target.c === drag.c && target.slot === drag.slot)) {
    const tray = trays.find(t => t.id === drag.trayId);
    if (tray) {
      const srcKey = `${drag.r}-${drag.c}-${drag.slot}`;
      const dstKey = `${target.r}-${target.c}-${target.slot}`;
      const srcEgg = tray.eggs[srcKey];
      const dstEgg = tray.eggs[dstKey];
      if (dstEgg) tray.eggs[srcKey] = dstEgg; else delete tray.eggs[srcKey];
      tray.eggs[dstKey] = srcEgg;
      save();
      renderTrayInto(tray, document.querySelector(`.tray-view[data-id="${drag.trayId}"]`));
    }
  }
  drag.active = false;
}

function cleanup() {
  hideGhost();
  document.querySelectorAll('.egg-wrap.dragging, .egg-wrap.drop-target').forEach(e => {
    e.classList.remove('dragging', 'drop-target');
  });
  document.body.style.userSelect = '';
  document.body.style.webkitUserSelect = '';
  if (drag.timer) { clearTimeout(drag.timer); drag.timer = null; }
}

// ── 각 알에 이벤트 부착 ──
function attachDragEvents(tray) {
  const grid = document.getElementById(`grid-${tray.id}`);
  if (!grid) return;
  grid.dataset.trayId = tray.id;

  grid.querySelectorAll('.egg-wrap:not(.empty)').forEach(ew => {
    const slot = parseInt(ew.dataset.slot);
    const cell = ew.closest('.cell');
    const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);

    // ── 터치 ──
    ew.addEventListener('touchstart', e => {
      const t = e.touches[0];
      drag.startX = t.clientX; drag.startY = t.clientY; drag.moved = false;
      drag.timer = setTimeout(() => {
        if (!drag.moved) startDrag(tray.id, r, c, slot, t.clientX, t.clientY);
      }, LONG_PRESS_MS);
    }, { passive: true });

    // ── 마우스 ──
    ew.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      drag.startX = e.clientX; drag.startY = e.clientY; drag.moved = false;
      drag.timer = setTimeout(() => {
        if (!drag.moved) startDrag(tray.id, r, c, slot, e.clientX, e.clientY);
      }, LONG_PRESS_MS);
    });
  });
}

// ── document 레벨 — 이동/종료 ──
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  // 롱프레스 중 움직임 감지
  if (drag.timer && !drag.active) {
    const dx = t.clientX - drag.startX, dy = t.clientY - drag.startY;
    if (Math.hypot(dx, dy) > DRAG_THRESHOLD) {
      clearTimeout(drag.timer); drag.timer = null; drag.moved = true;
    }
  }
  if (drag.active) { e.preventDefault(); onDragMove(t.clientX, t.clientY); }
}, { passive: false });

document.addEventListener('touchend', e => {
  if (drag.timer) { clearTimeout(drag.timer); drag.timer = null; }
  if (drag.active) {
    const t = e.changedTouches[0];
    onDragEnd(t.clientX, t.clientY);
  }
});
document.addEventListener('touchcancel', () => { cleanup(); drag.active = false; });

document.addEventListener('mousemove', e => {
  if (drag.timer && !drag.active) {
    const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
    if (Math.hypot(dx, dy) > DRAG_THRESHOLD) {
      clearTimeout(drag.timer); drag.timer = null; drag.moved = true;
    }
  }
  if (drag.active) onDragMove(e.clientX, e.clientY);
});
document.addEventListener('mouseup', e => {
  if (drag.timer) { clearTimeout(drag.timer); drag.timer = null; }
  if (drag.active) onDragEnd(e.clientX, e.clientY);
});
</script>
